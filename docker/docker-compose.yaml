services:
  base:
    container_name: base
    image: gogoshine/base:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "30000:30000"
    volumes:
      - ./logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    env_file:
      - .env
    environment:
      # 非敏感配置：直接在 compose 中声明
      APP_SERVER_HOST: "0.0.0.0"
      APP_SERVER_PORT: 30000
      APP_SERVER_MODE: release
      APP_LOGGER_LEVEL: info
      APP_LOGGER_FORMAT: json
      APP_LOGGER_FILENAME: logs/base.log
      APP_LOGGER_MAX_SIZE: 10
      APP_LOGGER_MAX_BACKUPS: 10
      APP_DATABASE_SSLMODE: disable
      APP_DATABASE_TIMEZONE: Asia/Shanghai
      APP_DATABASE_MAX_IDLE_CONNS: 10
      APP_DATABASE_MAX_OPEN_CONNS: 100
      # 敏感配置（APP_DATABASE_*）由 .env 注入，变量名与程序一致
      TZ: Asia/Shanghai
    networks:
      - base-net

networks:
  base-net:
    driver: bridge
